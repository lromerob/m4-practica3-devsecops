name: Pipeline DevSecOps CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Scan Docker Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout de Código
      uses: actions/checkout@v3

    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Construir Imagen Docker
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        load: true # ← Esto carga la imagen en el Docker local para que Trivy la vea
        tags: lromerob/app-flask:latest

    - name: Escanear Imagen con Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'lromerob/app-flask:latest'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'
